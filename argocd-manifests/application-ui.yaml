apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ui
  namespace: argocd

spec:
  project: default
  source:
    repoURL: https://github.com/arid1182/aws-devops-github-actions-ecr-argocd2.git
    targetRevision: main
    path: src/ui/chart
    helm:
      valueFiles:
        - vlaues-ui.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true